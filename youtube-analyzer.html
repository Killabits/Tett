<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAMASERVICE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Barlow+Condensed:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080810;
  --s1:        #0e0e1a;
  --s2:        #13131f;
  --s3:        #1c1c2e;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #f0f0f8;
  --text2:     #9898b8;
  --text3:     #55556a;
  --accent:    #e63462;
  --accent2:   #ff6b8a;
  --blue:      #3b82f6;
  --cyan:      #06b6d4;
  --green:     #10b981;
  --gold:      #f59e0b;
  --purple:    #8b5cf6;
  --r: 14px;
  --r-sm: 8px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── ATMOSPHERIC BG ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 0%, rgba(230,52,98,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 100%, rgba(59,130,246,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-mark {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--s3);
  border: 1px solid var(--border2);
}
.logo-mark img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.logo-mark-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--accent), #8b2fc9);
}
.logo-mark-fallback svg { width: 18px; height: 18px; fill: white; }

.logo-text-block { line-height: 1; }
.logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
}
.logo-name span { color: var(--accent); }
.logo-by {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pill-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
}
.live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2.5s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 34px;
  padding: 0 14px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border2);
  background: var(--s2);
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s ease;
  white-space: nowrap;
}
.btn:hover { background: var(--s3); color: var(--text); border-color: var(--border2); }
.btn svg { transition: transform 0.5s ease; }
.btn.spinning svg { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

/* ── MAIN ── */
main {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

/* ── STATS STRIP ── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 28px;
}

.strip-cell {
  background: var(--s1);
  padding: 20px 24px;
  position: relative;
  transition: background 0.15s;
}
.strip-cell:hover { background: var(--s2); }
.strip-cell::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--cell-accent, transparent);
  opacity: 0.6;
}

.strip-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.strip-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  line-height: 1;
  color: var(--cell-accent, var(--text));
  letter-spacing: -0.5px;
}

/* ── NAV TABS ── */
.nav-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.nav-tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text3);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 20px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: -1px;
}
.nav-tab:hover { color: var(--text2); }
.nav-tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ── ADD ROW ── */
.add-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.add-input {
  flex: 1;
  min-width: 220px;
  height: 40px;
  padding: 0 16px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  font-weight: 400;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.add-input::placeholder { color: var(--text3); }
.add-input:focus {
  border-color: rgba(230,52,98,0.4);
  box-shadow: 0 0 0 3px rgba(230,52,98,0.08);
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── CHANNEL GRID ── */
.channel-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* ── CHANNEL CARD ── */
.ch-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ch-card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.ch-card-top-bar {
  height: 2px;
  width: 100%;
}

.ch-card-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.ch-identity { display: flex; align-items: center; gap: 10px; }

.ch-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: #fff;
  letter-spacing: 0.5px;
}

.ch-name {
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.2px;
  color: var(--text);
}
.ch-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
  margin-top: 2px;
}

.icon-btn {
  width: 26px; height: 26px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(230,52,98,0.06); }
.icon-btn svg { width: 11px; height: 11px; }

/* ── STAT GRID ── */
.ch-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}

.stat {
  background: var(--s1);
  padding: 14px 16px;
}
.stat.wide { grid-column: 1 / -1; }

.stat-lbl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.55rem;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.3px;
}

.stat-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.52rem;
  color: var(--text3);
  margin-top: 3px;
  letter-spacing: 0.5px;
}

/* Ratio bar */
.ratio-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 8px;
  overflow: hidden;
}
.ratio-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
}

/* Score chip */
.score-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--s2);
}
.score-lbl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
}
.score-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent2);
}

/* Sparkline */
.spark-wrap {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
}
.spark-lbl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.spark-svg { width: 100%; height: 38px; overflow: visible; display: block; }

/* Loading card */
.loading-shimmer {
  padding: 32px 16px;
  text-align: center;
}
.shimmer-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
  margin: 0 2px;
  animation: shimmer 1.2s ease infinite;
}
@keyframes shimmer {
  0%,100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
}
.shimmer-dot:nth-child(2) { animation-delay: 0.15s; }
.shimmer-dot:nth-child(3) { animation-delay: 0.3s; }

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1 / -1;
  padding: 64px 32px;
  border: 1px dashed var(--border);
  border-radius: var(--r);
  text-align: center;
  color: var(--text3);
}
.empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.25; display: block; margin-left: auto; margin-right: auto; }
.empty-state p {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  line-height: 2;
}

/* ── RANKING ── */
#rankingView { display: none; }

.rank-list { display: flex; flex-direction: column; gap: 8px; }

.rank-item {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: grid;
  grid-template-columns: 48px 1fr 80px;
  align-items: center;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
  animation: fadeUp 0.3s ease both;
  position: relative;
}
.rank-item:hover { border-color: var(--border2); transform: translateX(2px); }

.rank-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--rank-color, var(--border2));
}

.rank-num-col {
  padding: 20px 0;
  text-align: center;
  border-right: 1px solid var(--border);
}
.rank-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text3);
  line-height: 1;
}
.rank-item:nth-child(1) .rank-num { color: var(--gold); }
.rank-item:nth-child(2) .rank-num { color: #94a3b8; }
.rank-item:nth-child(3) .rank-num { color: #cd7f32; }

.rank-body { padding: 16px 20px; }

.rank-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.rank-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.7rem;
  color: #fff;
}
.rank-name {
  font-weight: 600;
  font-size: 0.88rem;
  color: var(--text);
}

.metric-rows { display: flex; flex-direction: column; gap: 5px; }
.metric-row { display: flex; align-items: center; gap: 10px; }
.metric-key {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
  width: 72px;
  flex-shrink: 0;
}
.metric-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.metric-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
.metric-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.52rem;
  color: var(--text2);
  width: 42px;
  text-align: right;
  flex-shrink: 0;
}

.rank-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
.rank-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.5px;
  padding: 3px 7px;
  border-radius: 3px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  color: var(--text3);
}
.rank-pill.pos { color: var(--green); border-color: rgba(16,185,129,0.2); background: rgba(16,185,129,0.05); }

.rank-score-col {
  padding: 20px 16px;
  text-align: center;
  border-left: 1px solid var(--border);
}
.rank-score-big {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
  letter-spacing: -1px;
}
.rank-score-max {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.5rem;
  color: var(--text3);
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  header { padding: 0 16px; }
  main { padding: 20px 16px 60px; }
  .stats-strip { grid-template-columns: 1fr 1fr; }
  .channel-grid { grid-template-columns: 1fr; }
  .rank-item { grid-template-columns: 40px 1fr 64px; }
  .strip-value { font-size: 1.5rem; }
  .logo-name { font-size: 1rem; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <img id="logoImg" src="https://i.imgur.com/rXa2aEV.jpg" alt="Logo" onload="this.style.display='block';this.parentElement.querySelector('.logo-mark-fallback').style.display='none'" onerror="this.style.display='none'">
      <div class="logo-mark-fallback">
        <svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
      </div>
    </div>
    <div class="logo-text-block">
      <div class="logo-name">DRAMA<span>SERVICE</span></div>
      <div class="logo-by">BY PILSNERBRITT</div>
    </div>
  </a>
  <div class="header-right">
    <div class="pill-badge">
      <span class="live-dot"></span>
      <span id="lastUpdated">LIVE</span>
    </div>
    <button class="btn" id="refreshBtn" onclick="refreshAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Uppdatera
    </button>
  </div>
</header>

<main>

  <!-- Stats strip -->
  <div class="stats-strip">
    <div class="strip-cell" style="--cell-accent: var(--accent)">
      <div class="strip-label">Kanaler</div>
      <div class="strip-value" id="sumChannels">0</div>
    </div>
    <div class="strip-cell" style="--cell-accent: var(--gold)">
      <div class="strip-label">Prenumeranter</div>
      <div class="strip-value" id="sumSubs">—</div>
    </div>
    <div class="strip-cell" style="--cell-accent: var(--cyan)">
      <div class="strip-label">Visningar</div>
      <div class="strip-value" id="sumViews">—</div>
    </div>
    <div class="strip-cell" style="--cell-accent: var(--green)">
      <div class="strip-label">Engagemang</div>
      <div class="strip-value" id="sumEngagement">—</div>
    </div>
  </div>

  <!-- Nav tabs -->
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('channels')">Kanaler</button>
    <button class="nav-tab" onclick="switchTab('ranking')">Ranking</button>
  </nav>

  <!-- Channels view -->
  <div id="channelsView">
    <div class="add-row">
      <input class="add-input" id="channelInput" type="text" placeholder="Kanalnamn eller @handle — t.ex. @MrBeast" />
      <button class="btn btn-primary" onclick="addChannel()">Spåra kanal</button>
    </div>
    <div class="section-label">Spårade kanaler</div>
    <div class="channel-grid" id="channelsGrid">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <p>Inga kanaler spåras ännu<br>Lägg till en kanal ovan</p>
      </div>
    </div>
  </div>

  <!-- Ranking view -->
  <div id="rankingView">
    <div class="section-label">Engagemangsranking</div>
    <div class="rank-list" id="leaderboard">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
        </svg>
        <p>Lägg till minst 2 kanaler<br>för att se ranking</p>
      </div>
    </div>
  </div>

<script>

// ─── Config ───────────────────────────────────────────────────────────────────
const YT_API_KEY = 'AIzaSyAVOaSXrASWP64P_13DpRVCgmhwbT_crJE';

const PALETTES = [
  { bar: '#7c3aed', avatar: '#7c3aed' },
  { bar: '#ec4899', avatar: '#ec4899' },
  { bar: '#06b6d4', avatar: '#0891b2' },
  { bar: '#10b981', avatar: '#059669' },
  { bar: '#f59e0b', avatar: '#d97706' },
  { bar: '#f97316', avatar: '#ea580c' },
  { bar: '#8b5cf6', avatar: '#7c3aed' },
  { bar: '#14b8a6', avatar: '#0f766e' },
];

let channels = [];
let paletteIndex = 0;
let currentTab = 'channels';

// ─── Scoring System ───────────────────────────────────────────────────────────
// Points based on ABSOLUTE thresholds, not relative to group.
// This way scores are meaningful and consistent regardless of who is in the group.
//
// VISN/SUB RATIO (30p)  — views / subscribers. Good = 0.5+ (half your subs watched)
// GILLNINGSGRAD (35p)   — likes / views. Good = 5%+ like rate
// AKTIVITET (20p)       — videos posted (out of 10 fetched slots with >0 views)
// SNITTVISN/VIDEO (15p) — avg views per video relative to subscriber count

function calculateRankings() {
  const scored = channels.filter(c => c.liveData && c.isReal && !c.loading);
  if (scored.length < 1) return [];

  return scored.map(ch => {
    const d = ch.liveData;
    const subs = Math.max(d.subs, 1);
    const views = d.totalViews10d || 0;
    const likes = d.recentLikes || 0;
    const activeVideos = d.viewHistory.filter(v => v > 0).length;
    const avgViews = activeVideos > 0 ? views / activeVideos : 0;

    // 1. View/Sub ratio — capped at 1.0 (100% of subs watched = max)
    const viewSubRatio = Math.min(views / subs, 1.0);
    const viewScore = Math.round(viewSubRatio * 30);

    // 2. Like rate — capped at 10% (anything above 10% like rate = max)
    const likeRate = views > 0 ? likes / views : 0;
    const likeScore = Math.round(Math.min(likeRate / 0.10, 1.0) * 35);

    // 3. Activity — how many of the 10 fetched videos have views (direct %)
    const activityScore = Math.round((activeVideos / 10) * 20);

    // 4. Avg views per video vs subscribers — capped at 50% of subs
    const avgViewRatio = Math.min(avgViews / subs, 0.5) / 0.5;
    const avgViewScore = Math.round(avgViewRatio * 15);

    const total = viewScore + likeScore + activityScore + avgViewScore;

    // Bar widths: show actual % of max possible for each metric
    const bars = {
      visnSub:   Math.round(viewSubRatio * 100),
      gillRate:  Math.round(Math.min(likeRate / 0.10, 1.0) * 100),
      aktivitet: Math.round((activeVideos / 10) * 100),
    };

    return {
      ch,
      total,
      bars,
      breakdown: {
        visningar: viewScore,
        gilla:     likeScore,
        aktivitet: activityScore,
        snittvisn: avgViewScore,
      },
      details: {
        viewSubRatioPct: (viewSubRatio * 100).toFixed(1),
        likeRatePct:     (likeRate * 100).toFixed(2),
        activeVideos,
        avgViews: Math.round(avgViews),
      }
    };
  }).sort((a, b) => b.total - a.total);
}

// ─── YouTube API ──────────────────────────────────────────────────────────────
async function fetchChannelData(nameOrHandle) {
  const key = YT_API_KEY;
  const handle = nameOrHandle.startsWith('@') ? nameOrHandle : '@' + nameOrHandle;
  let data, res;

  res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=' + encodeURIComponent(handle) + '&key=' + key);
  data = await res.json();
  if (data.error) throw new Error('API-fel: ' + (data.error.message || 'kvot överskriden'));

  if (!data.items || !data.items.length) {
    res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=' + encodeURIComponent(nameOrHandle) + '&key=' + key);
    data = await res.json();
    if (data.error) throw new Error('API-fel: ' + (data.error.message || 'kvot överskriden'));
  }

  if (!data.items || !data.items.length) throw new Error('Kanalen hittades inte. Prova med exakt @handle.');

  const ch = data.items[0];
  const channelId = ch.id;
  const resolvedName = ch.snippet.title;
  const avatarUrl = ch.snippet.thumbnails && ch.snippet.thumbnails.default ? ch.snippet.thumbnails.default.url : null;
  const subs = parseInt(ch.statistics.subscriberCount || 0);

  let recentLikes = 0;
  let viewHistory = Array(10).fill(0);

  try {
    const vRes = await fetch('https://www.googleapis.com/youtube/v3/search?part=id&channelId=' + channelId + '&maxResults=10&order=date&type=video&key=' + key);
    const vData = await vRes.json();
    if (!vData.error && vData.items && vData.items.length) {
      const ids = vData.items.map(function(v) { return v.id.videoId; }).join(',');
      const sRes = await fetch('https://www.googleapis.com/youtube/v3/videos?part=statistics&id=' + ids + '&key=' + key);
      const sData = await sRes.json();
      if (!sData.error && sData.items) {
        sData.items.forEach(function(v, i) {
          recentLikes += parseInt(v.statistics.likeCount || 0);
          viewHistory[i] = parseInt(v.statistics.viewCount || 0);
        });
      }
    }
  } catch(e) {}

  const totalViews10d = viewHistory.reduce(function(a,b){return a+b;},0);
  return { resolvedName, avatarUrl, subs, totalViews10d, recentLikes, viewHistory, isReal: true };
}

// ─── Formatters ───────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n.toLocaleString('sv-SE');
}
function pct(n) { return (n*100).toFixed(1) + '%'; }
function getInitials(name) { return name.replace(/^@/,'').slice(0,2).toUpperCase(); }

// ─── Sparkline ────────────────────────────────────────────────────────────────
function buildSparkline(data, color) {
  const W=320, H=40;
  const nonzero = data.filter(v=>v>0);
  if (nonzero.length < 2) return '<svg class="sparkline-svg"><text x="50%" y="50%" fill="#3a3a5c" font-size="10" text-anchor="middle" dominant-baseline="middle" font-family="JetBrains Mono">ingen data</text></svg>';
  const min=Math.min(...data), max=Math.max(...data);
  const range=max-min||1;
  const pts=data.map(function(v,i){
    return [(i/(data.length-1))*W, H-((v-min)/range)*(H-6)-3];
  });
  const pathD='M '+pts.map(p=>p.join(',')).join(' L ');
  const areaD='M '+pts[0].join(',') + ' L '+pts.map(p=>p.join(',')).join(' L ')+' L '+W+','+H+' L 0,'+H+' Z';
  const id='sg'+color.replace('#','');
  return '<svg class="sparkline-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs><path d="'+areaD+'" fill="url(#'+id+')"/><path d="'+pathD+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+pts[pts.length-1][0]+'" cy="'+pts[pts.length-1][1]+'" r="3" fill="'+color+'"/></svg>';
}

// ─── Card renderer ────────────────────────────────────────────────────────────
function renderCard(ch) {
  const p = ch.palette;
  const X = (id) => `<button class="icon-btn" onclick="removeChannel('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;

  if (ch.loading) return `<div class="ch-card" id="card-${ch.id}"><div class="ch-card-top-bar" style="background:${p.bar}"></div><div class="ch-card-header"><div class="ch-identity"><div class="ch-avatar" style="background:${p.avatar}">${getInitials(ch.name)}</div><div><div class="ch-name">${ch.name}</div><div class="ch-status" style="color:${p.bar}">Hämtar data...</div></div></div></div><div class="loading-shimmer"><span class="shimmer-dot" style="background:${p.bar}"></span><span class="shimmer-dot" style="background:${p.bar}"></span><span class="shimmer-dot" style="background:${p.bar}"></span></div></div>`;

  if (ch.error && !ch.liveData) return `<div class="ch-card" id="card-${ch.id}"><div class="ch-card-top-bar" style="background:#ef4444"></div><div class="ch-card-header"><div class="ch-identity"><div class="ch-avatar" style="background:#333">??</div><div><div class="ch-name">${ch.name}</div><div class="ch-status" style="color:#ef4444">Fel vid hämtning</div></div></div>${X(ch.id)}</div><div style="padding:16px;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:#ef4444;line-height:1.8">⚠ ${ch.error}<br><span style="color:var(--text3)">Prova @handle-format</span></div><div style="padding:0 16px 14px"><button onclick="retryChannel('${ch.id}')" class="btn" style="height:28px;padding:0 12px;font-size:0.65rem">↺ Försök igen</button></div></div>`;

  const d = ch.liveData;
  const ratio = ((d.subs/(d.totalViews10d||1))*100).toFixed(1);
  const likeRate = d.totalViews10d > 0 ? ((d.recentLikes/d.totalViews10d)*100).toFixed(2) : '0.00';
  const ratioW = Math.min(parseFloat(ratio),100);
  const statusLabel = ch.isReal ? 'Live · YouTube API' : 'Simulerad data';
  const statusColor = ch.isReal ? 'var(--green)' : 'var(--text3)';
  const avatarHtml = ch.avatarUrl ? `<img src="${ch.avatarUrl}" class="ch-avatar" style="width:34px;height:34px" alt="">` : `<div class="ch-avatar" style="background:${p.avatar}">${getInitials(ch.name)}</div>`;
  const rankings = calculateRankings();
  const myRank = rankings.find(r => r.ch.id === ch.id);
  const scoreHtml = myRank ? `<div class="score-row"><span class="score-lbl">Engagemangspoäng</span><span class="score-val">${myRank.total} <span style="font-size:0.7rem;color:var(--text3);font-weight:400">/ 100</span></span></div>` : '';

  return `<div class="ch-card" id="card-${ch.id}">
    <div class="ch-card-top-bar" style="background:${p.bar}"></div>
    <div class="ch-card-header">
      <div class="ch-identity">${avatarHtml}<div><div class="ch-name">${ch.name}</div><div class="ch-status" style="color:${statusColor}">${statusLabel}</div></div></div>
      ${X(ch.id)}
    </div>
    <div class="ch-stats">
      <div class="stat"><div class="stat-lbl">Prenumeranter</div><div class="stat-num" id="stat-subs-${ch.id}">${fmt(d.subs)}</div></div>
      <div class="stat"><div class="stat-lbl">Gillningar</div><div class="stat-num" id="stat-likes-${ch.id}">${fmt(d.recentLikes)}</div></div>
      <div class="stat wide"><div class="stat-lbl">Visningar — senaste 10 videos</div><div class="stat-num" id="stat-views-${ch.id}">${fmt(d.totalViews10d)}</div></div>
      <div class="stat"><div class="stat-lbl">Gillningsgrad</div><div class="stat-num" style="color:var(--cyan)" id="stat-lr-${ch.id}">${likeRate}%</div><div class="stat-sub">Gillningar / visningar</div></div>
      <div class="stat"><div class="stat-lbl">Sub / Visn-ratio</div><div class="stat-num" style="color:${p.bar}" id="stat-ratio-${ch.id}">${ratio}%</div><div class="ratio-track"><div class="ratio-fill" id="ratio-bar-${ch.id}" style="width:${ratioW}%;background:${p.bar}"></div></div></div>
    </div>
    ${scoreHtml}
    <div class="spark-wrap"><div class="spark-lbl">Videovisningar — trend</div><div id="spark-${ch.id}">${buildSparkline(d.viewHistory, p.bar)}</div></div>
  </div>`;
}

// ─── Leaderboard renderer ─────────────────────────────────────────────────────
function renderLeaderboard() {
  const lb = document.getElementById('leaderboard');
  const rankings = calculateRankings();

  if (rankings.length < 1) {
    lb.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg><p>Lägg till minst 2 kanaler<br>för att se ranking</p></div>';
    return;
  }

  const rankNums = ['1','2','3'];
  const rankColors = ['var(--gold)','#94a3b8','#cd7f32'];

  lb.innerHTML = rankings.map(function(r, i) {
    const color = rankColors[i] || 'var(--text3)';
    const p = r.ch.palette;
    const vW = r.bars.visnSub;
    const lW = r.bars.gillRate;
    const cW = r.bars.aktivitet;
    const pillColors = {visningar:'var(--cyan)',gilla:'var(--accent2)',aktivitet:'var(--green)',snittvisn:'var(--gold)'};
    const pillLabels = {visningar:'Visn',gilla:'Gilln',aktivitet:'Aktiv',snittvisn:'Snitt'};
    const pills = Object.entries(r.breakdown).map(([k,v]) =>
      `<span class="rank-pill${v>0?' pos':''}">${pillLabels[k]} +${v}p</span>`
    ).join('');
    const avatarHtml = r.ch.avatarUrl
      ? `<img src="${r.ch.avatarUrl}" class="rank-avatar" style="background:${p.avatar}" alt="">`
      : `<div class="rank-avatar" style="background:${p.avatar}">${getInitials(r.ch.name)}</div>`;

    return `<div class="rank-item" style="--rank-color:${p.bar}">
      <div class="rank-num-col"><div class="rank-num" style="color:${color}">${rankNums[i] || (i+1)}</div></div>
      <div class="rank-body">
        <div class="rank-head">${avatarHtml}<span class="rank-name">${r.ch.name}</span></div>
        <div class="metric-rows">
          <div class="metric-row"><span class="metric-key">Visn/sub</span><div class="metric-track"><div class="metric-fill" style="width:${vW}%;background:var(--cyan)"></div></div><span class="metric-val">${r.details.viewSubRatioPct}%</span></div>
          <div class="metric-row"><span class="metric-key">Gilln.grad</span><div class="metric-track"><div class="metric-fill" style="width:${lW}%;background:var(--accent2)"></div></div><span class="metric-val">${r.details.likeRatePct}%</span></div>
          <div class="metric-row"><span class="metric-key">Aktivitet</span><div class="metric-track"><div class="metric-fill" style="width:${cW}%;background:var(--green)"></div></div><span class="metric-val">${r.details.activeVideos}/10</span></div>
        </div>
        <div class="rank-pills">${pills}</div>
      </div>
      <div class="rank-score-col"><div class="rank-score-big">${r.total}</div><div class="rank-score-max">/ 100</div></div>
    </div>`;
  }).join('');
}


// ─── Core actions ─────────────────────────────────────────────────────────────
async function addChannel() {
  const input = document.getElementById('channelInput');
  const raw = input.value.trim();
  if (!raw) return;

  const id = 'ch_' + Date.now();
  const palette = PALETTES[paletteIndex % PALETTES.length];
  paletteIndex++;

  const ch = { id, name: raw, palette, baseData: null, liveData: null, loading: true };
  channels.push(ch);
  input.value = '';
  updateGrid();

  try {
    const apiData = await fetchChannelData(raw);
    ch.name = apiData.resolvedName;
    ch.avatarUrl = apiData.avatarUrl;
    ch.baseData = apiData;
    ch.liveData = { ...apiData };
    ch.loading = false;
    ch.isReal = true;
    ch.error = null;
  } catch(e) {
    ch.loading = false;
    ch.isReal = false;
    ch.error = e.message || 'Hämtning misslyckades';
    ch.liveData = null;
  }

  const existing = document.getElementById('card-' + id);
  if (existing) {
    const div = document.createElement('div');
    div.innerHTML = renderCard(ch);
    existing.replaceWith(div.firstElementChild);
  }
  updateSummary();
  renderLeaderboard();
}

async function retryChannel(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  ch.loading = true; ch.error = null; ch.liveData = null;
  const el = document.getElementById('card-'+id);
  if (el) { const d=document.createElement('div'); d.innerHTML=renderCard(ch); el.replaceWith(d.firstElementChild); }
  try {
    const apiData = await fetchChannelData(ch.name);
    ch.name = apiData.resolvedName; ch.avatarUrl = apiData.avatarUrl;
    ch.baseData = apiData; ch.liveData = {...apiData};
    ch.loading = false; ch.isReal = true; ch.error = null;
  } catch(e) {
    ch.loading = false; ch.isReal = false;
    ch.error = e.message || 'Hämtning misslyckades'; ch.liveData = null;
  }
  const el2 = document.getElementById('card-'+id);
  if (el2) { const d=document.createElement('div'); d.innerHTML=renderCard(ch); el2.replaceWith(d.firstElementChild); }
  updateSummary(); renderLeaderboard();
}

function removeChannel(id) {
  channels = channels.filter(c => c.id !== id);
  updateGrid(); updateSummary(); renderLeaderboard();
}

function updateGrid() {
  const grid = document.getElementById('channelsGrid');
  if (channels.length === 0) {
    grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><p>Inga kanaler spåras ännu<br>Lägg till en kanal ovan</p></div>';
    return;
  }
  const existingIds = new Set([...grid.querySelectorAll('.ch-card')].map(el=>el.id.replace('card-','')));
  const currentIds = new Set(channels.map(c=>c.id));
  existingIds.forEach(id=>{ if(!currentIds.has(id)){const el=document.getElementById('card-'+id);if(el)el.remove();} });
  channels.forEach(ch=>{ if(!existingIds.has(ch.id)){const div=document.createElement('div');div.innerHTML=renderCard(ch);grid.appendChild(div.firstElementChild);} });
}

function updateSummary() {
  const loaded = channels.filter(c => !c.loading && c.liveData && c.isReal);
  document.getElementById('sumChannels').textContent = channels.length;
  if (!loaded.length) {
    ['sumSubs','sumViews','sumEngagement'].forEach(id=>document.getElementById(id).textContent='—');
    return;
  }
  const totalSubs = loaded.reduce((a,c)=>a+c.liveData.subs,0);
  const totalViews = loaded.reduce((a,c)=>a+c.liveData.totalViews10d,0);
  const avgEng = loaded.reduce((a,c)=>a+(c.liveData.totalViews10d>0?c.liveData.recentLikes/c.liveData.totalViews10d:0),0)/loaded.length;
  document.getElementById('sumSubs').textContent = fmt(totalSubs);
  document.getElementById('sumViews').textContent = fmt(totalViews);
  document.getElementById('sumEngagement').textContent = (avgEng*100).toFixed(2)+'%';
}

// ─── Logo (hardcoded) ────────────────────────────────────────────────────────
(function() {
  const img = document.getElementById('logoImg');
  const svg = document.getElementById('logoSvg');
  img.src = 'https://i.imgur.com/rXa2aEV.jpg';
  img.style.display = 'block';
  svg.style.display = 'none';
  img.onerror = function() { img.style.display='none'; svg.style.display='block'; };
})();

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  const loaded = channels.filter(c=>!c.loading && c.liveData && c.isReal);
  await Promise.all(loaded.map(async ch=>{
    try {
      const fresh = await fetchChannelData(ch.name);
      ch.baseData = fresh; ch.liveData = {...fresh};
      const s = ch.liveData;
      const ratio = ((s.subs/(s.totalViews10d||1))*100).toFixed(1);
      const lr = s.totalViews10d>0?((s.recentLikes/s.totalViews10d)*100).toFixed(2):'0.00';
      const el = id=>document.getElementById(id+'-'+ch.id);
      if(el('stat-subs')) el('stat-subs').textContent=fmt(s.subs);
      if(el('stat-likes')) el('stat-likes').textContent=fmt(s.recentLikes);
      if(el('stat-views')) el('stat-views').textContent=fmt(s.totalViews10d);
      if(el('stat-lr')) el('stat-lr').textContent=lr+'%';
      if(el('stat-ratio')) el('stat-ratio').textContent=ratio+'%';
      const rb=document.getElementById('ratio-bar-'+ch.id); if(rb) rb.style.width=Math.min(parseFloat(ratio),100)+'%';
      if(el('spark')) el('spark').innerHTML=buildSparkline(s.viewHistory,ch.palette.bar);
    } catch(e){}
  }));
  updateSummary(); renderLeaderboard();
  btn.classList.remove('spinning');
  const now = new Date();
  document.getElementById('lastUpdated').textContent = 'Uppdaterad '+now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('channelsView').style.display = tab==='channels'?'block':'none';
  document.getElementById('rankingView').style.display = tab==='ranking'?'block':'none';
  document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',(tab==='channels'&&i===0)||(tab==='ranking'&&i===1)));
  if (tab==='ranking') renderLeaderboard();
}

// ─── Auto-refresh every 5 min ─────────────────────────────────────────────────
setInterval(function(){if(channels.filter(c=>!c.loading).length>0)refreshAll();},300000);

// ─── Enter key ────────────────────────────────────────────────────────────────
document.getElementById('channelInput').addEventListener('keydown',function(e){if(e.key==='Enter')addChannel();});

</script>
