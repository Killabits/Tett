<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temu vs Sekten Statistics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #161616;
    --border: #222222;
    --accent: #ff2d2d;
    --accent2: #ff6b35;
    --gold: #ffd166;
    --green: #06d6a0;
    --muted: #444;
    --text: #e8e8e8;
    --subtext: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 36px 48px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #111 0%, transparent 100%);
  }

  .logo-block { display: flex; align-items: center; gap: 14px; }

  .yt-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .yt-icon svg { width: 20px; height: 20px; fill: white; }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--subtext);
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Main layout */
  main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 48px;
  }

  /* Add channel panel */
  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 32px;
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .add-panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--subtext);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .add-input {
    flex: 1;
    min-width: 220px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--muted); }

  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .add-btn:hover { background: #e01e1e; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* Section heading */
  .section-heading {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 3px;
    color: var(--subtext);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Channel grid */
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  /* Channel card */
  .channel-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s;
    animation: fadeUp 0.4s ease both;
    position: relative;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .channel-card:hover {
    border-color: #333;
    transform: translateY(-2px);
  }

  /* Colored accent bar at top */
  .card-accent-bar {
    height: 3px;
    width: 100%;
  }

  .card-header {
    padding: 20px 22px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .channel-identity { display: flex; align-items: center; gap: 12px; }

  .channel-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: white;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .channel-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
  }

  .channel-id {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-actions { display: flex; gap: 8px; }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn svg { width: 13px; height: 13px; }

  /* Stats grid inside card */
  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .stat-cell {
    background: var(--card);
    padding: 18px 22px;
    position: relative;
  }

  .stat-cell.full-width {
    grid-column: 1 / -1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 1.5px;
    color: var(--subtext);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-label .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 1px;
    line-height: 1;
    color: var(--text);
  }

  .stat-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Ratio bar */
  .ratio-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .ratio-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Trend sparkline */
  .sparkline-wrap {
    padding: 14px 22px 16px;
    border-top: 1px solid var(--border);
  }

  .sparkline-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 1.5px;
    color: var(--subtext);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .sparkline-svg {
    width: 100%;
    height: 44px;
    overflow: visible;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 40px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    color: var(--muted);
  }

  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 1px; }

  /* Summary bar */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .summary-cell {
    background: var(--surface);
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .summary-cell-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--subtext);
    text-transform: uppercase;
  }

  .summary-cell-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    letter-spacing: 2px;
    color: var(--text);
  }

  .summary-cell-value.red { color: var(--accent); }
  .summary-cell-value.gold { color: var(--gold); }
  .summary-cell-value.green { color: var(--green); }

  /* Updating pulse */
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    header { padding: 20px 20px; flex-wrap: wrap; gap: 12px; }
    main { padding: 24px 20px; }
    .channels-grid { grid-template-columns: 1fr; }
    .summary-bar { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="yt-icon">
      <svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
    </div>
    <h1>TEMU VS <span>SEKTEN</span> STATISTICS</h1>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"><span class="live-dot"></span>SIMULATED DATA</span>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      REFRESH
    </button>
  </div>
</header>

<main>
  <!-- Summary Bar -->
  <div class="summary-bar" id="summaryBar">
    <div class="summary-cell">
      <div class="summary-cell-label">Channels Tracked</div>
      <div class="summary-cell-value red" id="sumChannels">0</div>
    </div>
    <div class="summary-cell">
      <div class="summary-cell-label">Total Subscribers</div>
      <div class="summary-cell-value gold" id="sumSubs">—</div>
    </div>
    <div class="summary-cell">
      <div class="summary-cell-label">Views (10d)</div>
      <div class="summary-cell-value" id="sumViews">—</div>
    </div>
    <div class="summary-cell">
      <div class="summary-cell-label">Avg Sub/View Ratio</div>
      <div class="summary-cell-value green" id="sumRatio">—</div>
    </div>
  </div>

  <!-- Add Channel Panel -->
  <div class="add-panel">
    <span class="add-panel-label">+ Add Channel</span>
    <input class="add-input" id="channelInput" type="text" placeholder="Enter channel name or ID (e.g. MrBeast, @mkbhd)" />
    <button class="add-btn" onclick="addChannel()">Track Channel</button>
  </div>

  <div class="section-heading">Tracked Channels</div>

  <!-- Channel Cards Grid -->
  <div class="channels-grid" id="channelsGrid">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <path d="M10 10l2-2 2 2"/>
      </svg>
      <p>NO CHANNELS TRACKED YET<br>ADD A CHANNEL ABOVE TO GET STARTED</p>
    </div>
  </div>
</main>

<script>
// ─── API Key ──────────────────────────────────────────────────────────────────
const YT_API_KEY = 'AIzaSyAVOaSXrASWP64P_13DpRVCgmhwbT_crJE';

// ─── Palette for channel colors ─────────────────────────────────────────────
const PALETTES = [
  { bar: '#ff2d2d', avatar: '#ff2d2d' },
  { bar: '#ff6b35', avatar: '#ff6b35' },
  { bar: '#ffd166', avatar: '#b89020' },
  { bar: '#06d6a0', avatar: '#048a67' },
  { bar: '#4cc9f0', avatar: '#1a86b0' },
  { bar: '#a855f7', avatar: '#7c3aed' },
  { bar: '#f472b6', avatar: '#be185d' },
  { bar: '#84cc16', avatar: '#4d7c0f' },
];

let channels = [];
let paletteIndex = 0;

// ─── YouTube API fetcher (direct, works on GitHub Pages) ────────────────────
async function fetchChannelData(nameOrHandle) {
  const key = YT_API_KEY;
  const handle = nameOrHandle.startsWith('@') ? nameOrHandle : '@' + nameOrHandle;
  let data, res;

  // Try forHandle
  res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=' + encodeURIComponent(handle) + '&key=' + key);
  data = await res.json();

  // Try as channel ID
  if (!data.items || !data.items.length) {
    res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=' + encodeURIComponent(nameOrHandle) + '&key=' + key);
    data = await res.json();
  }

  // Try search fallback
  if (!data.items || !data.items.length) {
    res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=' + encodeURIComponent(nameOrHandle) + '&maxResults=1&key=' + key);
    const s = await res.json();
    if (s.items && s.items.length) {
      const cid = s.items[0].snippet.channelId;
      res = await fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=' + cid + '&key=' + key);
      data = await res.json();
    }
  }

  if (!data.items || !data.items.length) throw new Error('Channel not found');

  const ch = data.items[0];
  const channelId = ch.id;
  const resolvedName = ch.snippet.title;
  const avatarUrl = ch.snippet.thumbnails && ch.snippet.thumbnails.default ? ch.snippet.thumbnails.default.url : null;
  const subs = parseInt(ch.statistics.subscriberCount || 0);

  // Fetch latest 10 videos for likes + view history
  let recentLikes = 0;
  let viewHistory = Array(10).fill(0);

  try {
    const vRes = await fetch('https://www.googleapis.com/youtube/v3/search?part=id&channelId=' + channelId + '&maxResults=10&order=date&type=video&key=' + key);
    const vData = await vRes.json();
    if (vData.items && vData.items.length) {
      const ids = vData.items.map(function(v) { return v.id.videoId; }).join(',');
      const sRes = await fetch('https://www.googleapis.com/youtube/v3/videos?part=statistics&id=' + ids + '&key=' + key);
      const sData = await sRes.json();
      if (sData.items) {
        sData.items.forEach(function(v, i) {
          recentLikes += parseInt(v.statistics.likeCount || 0);
          viewHistory[i] = parseInt(v.statistics.viewCount || 0);
        });
      }
    }
  } catch(e) { /* video fetch optional */ }

  const totalViews10d = viewHistory.reduce(function(a, b) { return a + b; }, 0);
  return { resolvedName: resolvedName, avatarUrl: avatarUrl, subs: subs, totalViews10d: totalViews10d, recentLikes: recentLikes, viewHistory: viewHistory, isReal: true };
}
// ─── Mock data generator (fallback) ──────────────────────────────────────────
function genMockData(name) {
  let seed = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const rng = (min, max) => {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    return Math.floor((seed / 0x7fffffff) * (max - min) + min);
  };
  const subs = rng(5000, 50_000_000);
  const avgDailyViews = rng(1000, subs * 0.08);
  const totalViews10d = Math.max(0, avgDailyViews * 10 + rng(-avgDailyViews * 2, avgDailyViews * 2));
  const recentLikes = rng(200, Math.floor(totalViews10d * 0.06));
  const viewHistory = [];
  for (let i = 0; i < 10; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    viewHistory.push(rng(avgDailyViews * 0.5, avgDailyViews * 1.8));
  }
  return { subs, totalViews10d, recentLikes, viewHistory, isReal: false };
}

function addNoise(data) {
  return {
    ...data,
    subs: data.subs + Math.floor((Math.random() - 0.5) * 500),
    totalViews10d: Math.max(0, data.totalViews10d + Math.floor((Math.random() - 0.5) * 3000)),
    recentLikes: Math.max(0, data.recentLikes + Math.floor((Math.random() - 0.5) * 50)),
    viewHistory: data.viewHistory.map(v => Math.max(0, v + Math.floor((Math.random() - 0.5) * v * 0.1))),
  };
}

// ─── Formatters ──────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toLocaleString();
}

function getInitials(name) {
  return name.replace(/^@/, '').slice(0, 2).toUpperCase();
}

// ─── Sparkline SVG builder ────────────────────────────────────────────────────
function buildSparkline(data, color) {
  const W = 340, H = 44;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - ((v - min) / range) * (H - 6) - 3;
    return `${x},${y}`;
  });
  const pathD = `M ${pts.join(' L ')}`;
  const areaD = `M ${pts[0]} L ${pts.join(' L ')} L ${W},${H} L 0,${H} Z`;

  return `
    <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sg_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#sg_${color.replace('#','')})" />
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="3" fill="${color}"/>
    </svg>
  `;
}

// ─── Card renderer ────────────────────────────────────────────────────────────
function renderCard(ch) {
  const palette = ch.palette;

  // Loading state
  if (ch.loading) {
    return `
      <div class="channel-card" id="card-${ch.id}">
        <div class="card-accent-bar" style="background: linear-gradient(90deg, ${palette.bar}, transparent)"></div>
        <div class="card-header">
          <div class="channel-identity">
            <div class="channel-avatar" style="background: ${palette.avatar}">${getInitials(ch.name)}</div>
            <div>
              <div class="channel-name">${ch.name}</div>
              <div class="channel-id" style="color:${palette.bar}">FETCHING FROM YOUTUBE...</div>
            </div>
          </div>
        </div>
        <div style="padding:40px;text-align:center;font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);letter-spacing:2px">
          <div style="margin-bottom:10px">
            <span style="display:inline-block;width:8px;height:8px;background:${palette.bar};border-radius:50%;animation:pulse 1s ease infinite"></span>
          </div>
          LOADING REAL DATA...
        </div>
      </div>`;
  }

  const d = ch.liveData;
  const ratio = ((d.subs / (d.totalViews10d || 1)) * 100).toFixed(2);
  const ratioBarWidth = Math.min(parseFloat(ratio), 100);
  const statusLabel = ch.isReal ? 'LIVE · YOUTUBE API' : (ch.error ? 'MOCK DATA · NOT FOUND' : 'SIMULATED · AUTO-REFRESH');
  const statusColor = ch.isReal ? 'var(--green)' : (ch.error ? 'var(--gold)' : 'var(--subtext)');
  const avatarContent = ch.avatarUrl
    ? `<img src="${ch.avatarUrl}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`
    : `<div class="channel-avatar" style="background:${palette.avatar}">${getInitials(ch.name)}</div>`;

  return `
    <div class="channel-card" id="card-${ch.id}">
      <div class="card-accent-bar" style="background: linear-gradient(90deg, ${palette.bar}, transparent)"></div>
      <div class="card-header">
        <div class="channel-identity">
          ${avatarContent}
          <div>
            <div class="channel-name">${ch.name}</div>
            <div class="channel-id" style="color:${statusColor}">${statusLabel}</div>
          </div>
        </div>
        <div class="card-actions">
          <button class="icon-btn" title="Remove channel" onclick="removeChannel('${ch.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="card-stats">
        <div class="stat-cell">
          <div class="stat-label"><span class="dot" style="color:${palette.bar}"></span>Subscribers</div>
          <div class="stat-value" id="stat-subs-${ch.id}">${fmt(d.subs)}</div>
          <div class="stat-sub">Total followers</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label"><span class="dot" style="color:#4cc9f0"></span>Video Likes</div>
          <div class="stat-value" id="stat-likes-${ch.id}">${fmt(d.recentLikes)}</div>
          <div class="stat-sub">Latest 10 videos</div>
        </div>
        <div class="stat-cell full-width">
          <div class="stat-label"><span class="dot" style="color:#ffd166"></span>Views — ${ch.isReal ? 'Latest 10 Videos' : 'Last 10 Days'}</div>
          <div class="stat-value" id="stat-views-${ch.id}">${fmt(d.totalViews10d)}</div>
          <div class="stat-sub">${ch.isReal ? 'Sum of recent video views' : 'Rolling 10-day window'}</div>
        </div>
        <div class="stat-cell full-width">
          <div class="stat-label"><span class="dot" style="color:${palette.bar}"></span>Sub / View Ratio</div>
          <div style="display:flex;align-items:baseline;gap:10px">
            <div class="stat-value" id="stat-ratio-${ch.id}" style="color:${palette.bar}">${ratio}%</div>
          </div>
          <div class="ratio-bar-track">
            <div class="ratio-bar-fill" id="ratio-bar-${ch.id}" style="width:${ratioBarWidth}%;background:${palette.bar}"></div>
          </div>
          <div class="stat-sub">Subscribers as % of recent views</div>
        </div>
      </div>

      <div class="sparkline-wrap">
        <div class="sparkline-label">${ch.isReal ? 'Per-Video View Distribution' : '10-Day View Trend'}</div>
        <div id="spark-${ch.id}">${buildSparkline(d.viewHistory, palette.bar)}</div>
      </div>
    </div>
  `;
}

// ─── Core actions ─────────────────────────────────────────────────────────────
async function addChannel() {
  const input = document.getElementById('channelInput');
  const raw = input.value.trim();
  if (!raw) return;

  const id = 'ch_' + Date.now();
  const palette = PALETTES[paletteIndex % PALETTES.length];
  paletteIndex++;

  // Show loading card immediately
  const ch = { id, name: raw, palette, baseData: null, liveData: null, loading: true };
  channels.push(ch);
  input.value = '';
  updateGrid();

  try {
    const apiData = await fetchChannelData(raw);
    ch.name = apiData.resolvedName;
    ch.avatarUrl = apiData.avatarUrl;
    ch.baseData = apiData;
    ch.liveData = { ...apiData };
    ch.loading = false;
    ch.isReal = true;
  } catch (e) {
    const mock = genMockData(raw);
    ch.baseData = mock;
    ch.liveData = { ...mock };
    ch.loading = false;
    ch.isReal = false;
    ch.error = true;
  }

  // Replace loading card with real card
  const existing = document.getElementById('card-' + id);
  if (existing) {
    const div = document.createElement('div');
    div.innerHTML = renderCard(ch);
    existing.replaceWith(div.firstElementChild);
  }
  updateSummary();
}

function removeChannel(id) {
  channels = channels.filter(c => c.id !== id);
  updateGrid();
  updateSummary();
}

function updateGrid() {
  const grid = document.getElementById('channelsGrid');

  if (channels.length === 0) {
    grid.innerHTML = `<div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
        <path d="M10 10l2-2 2 2"/>
      </svg>
      <p>NO CHANNELS TRACKED YET<br>ADD A CHANNEL ABOVE TO GET STARTED</p>
    </div>`;
    return;
  }

  const existingIds = new Set([...grid.querySelectorAll('.channel-card')].map(el => el.id.replace('card-', '')));
  const currentIds = new Set(channels.map(c => c.id));

  existingIds.forEach(id => {
    if (!currentIds.has(id)) {
      const el = document.getElementById('card-' + id);
      if (el) el.remove();
    }
  });

  channels.forEach(ch => {
    if (!existingIds.has(ch.id)) {
      const div = document.createElement('div');
      div.innerHTML = renderCard(ch);
      grid.appendChild(div.firstElementChild);
    }
  });
}

function updateSummary() {
  const loaded = channels.filter(c => !c.loading && c.liveData);
  document.getElementById('sumChannels').textContent = channels.length;
  if (loaded.length === 0) {
    document.getElementById('sumSubs').textContent = '—';
    document.getElementById('sumViews').textContent = '—';
    document.getElementById('sumRatio').textContent = '—';
    return;
  }
  const totalSubs = loaded.reduce((a, c) => a + c.liveData.subs, 0);
  const totalViews = loaded.reduce((a, c) => a + c.liveData.totalViews10d, 0);
  const avgRatio = (loaded.reduce((a, c) => a + parseFloat(((c.liveData.subs / (c.liveData.totalViews10d || 1)) * 100)), 0) / loaded.length).toFixed(2);
  document.getElementById('sumSubs').textContent = fmt(totalSubs);
  document.getElementById('sumViews').textContent = fmt(totalViews);
  document.getElementById('sumRatio').textContent = avgRatio + '%';
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  const loaded = channels.filter(c => !c.loading && c.liveData);

  // Re-fetch real channels; add noise to mock ones
  await Promise.all(loaded.map(async ch => {
    if (ch.isReal) {
      try {
        const fresh = await fetchChannelData(ch.name);
        ch.baseData = fresh;
        ch.liveData = { ...fresh };
      } catch(e) { ch.liveData = addNoise(ch.baseData); }
    } else {
      ch.liveData = addNoise(ch.baseData);
    }

    const s = ch.liveData;
    const ratio = ((s.subs / (s.totalViews10d || 1)) * 100).toFixed(2);
    const elSubs = document.getElementById(`stat-subs-${ch.id}`);
    const elLikes = document.getElementById(`stat-likes-${ch.id}`);
    const elViews = document.getElementById(`stat-views-${ch.id}`);
    const elRatio = document.getElementById(`stat-ratio-${ch.id}`);
    const elBar = document.getElementById(`ratio-bar-${ch.id}`);
    const elSpark = document.getElementById(`spark-${ch.id}`);
    if (elSubs) elSubs.textContent = fmt(s.subs);
    if (elLikes) elLikes.textContent = fmt(s.recentLikes);
    if (elViews) elViews.textContent = fmt(s.totalViews10d);
    if (elRatio) elRatio.textContent = ratio + '%';
    if (elBar) elBar.style.width = Math.min(parseFloat(ratio), 100) + '%';
    if (elSpark) elSpark.innerHTML = buildSparkline(s.viewHistory, ch.palette.bar);
  }));

  updateSummary();
  btn.classList.remove('spinning');
  const now = new Date();
  document.getElementById('lastUpdated').innerHTML =
    `<span class="live-dot"></span>UPDATED ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}`;
}

// ─── Auto-refresh every 5 minutes for real data ───────────────────────────────
setInterval(() => {
  if (channels.filter(c => !c.loading).length > 0) refreshAll();
}, 300000);

// ─── Enter key support ────────────────────────────────────────────────────────
document.getElementById('channelInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addChannel();
});
</script>
