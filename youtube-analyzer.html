<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAMASERVICE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Barlow+Condensed:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* --- Design & Layout --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080810; --s1: #0e0e1a; --s2: #13131f; --s3: #1c1c2e;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0f0f8; --text2: #9898b8; --text3: #55556a;
  --accent: #e63462; --accent2: #ff6b8a; --blue: #3b82f6;
  --cyan: #06b6d4; --green: #10b981; --gold: #f59e0b; --purple: #8b5cf6;
  --r: 14px; --r-sm: 8px;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 15% 0%, rgba(230,52,98,0.07) 0%, transparent 55%), radial-gradient(ellipse 50% 35% at 85% 100%, rgba(59,130,246,0.05) 0%, transparent 55%); pointer-events: none; z-index: 0; }
header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,16,0.85); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid var(--border); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 3px; }
.logo-name span { color: var(--accent); }

/* UPPGRADERAD LOGO-TEXT */
.logo-by { 
  font-family: 'IBM Plex Mono', monospace; 
  font-size: 0.65rem; 
  color: var(--text2); 
  letter-spacing: 3.5px; 
  text-transform: uppercase; 
  margin-top: 4px; 
  opacity: 0.9; 
}

.btn { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 14px; border-radius: var(--r-sm); border: 1px solid var(--border2); background: var(--s2); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; text-transform: uppercase; }
.btn.spinning svg { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
main { max-width: 1280px; margin: 0 auto; padding: 32px 40px; position: relative; z-index: 1; }

.stats-strip { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 28px; }
.strip-cell { background: var(--s1); padding: 20px 24px; min-height: 120px; transition: background 0.2s; }
.strip-cell:hover { background: var(--s2); }

.strip-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
.strip-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; opacity: 0.7; }

.winner-box { display: flex; align-items: center; gap: 12px; }
.winner-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border2); }
.winner-info { display: flex; flex-direction: column; }
.winner-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--text); }
.winner-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 700; line-height: 1; }

.nav-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.nav-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; padding: 12px 24px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
.nav-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--text3); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ch-card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.ch-card-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.ch-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
.ch-name { font-weight: 600; font-size: 1rem; flex: 1; }
.ch-status { font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; color: var(--green); }
.ch-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
.stat { background: var(--s1); padding: 16px; }
.stat-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 600; }
.stat-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; color: var(--text3); margin-top: 2px; }
.score-row { display: flex; justify-content: space-between; padding: 12px 16px; background: var(--s2); border-top: 1px solid var(--border); font-family: 'Barlow Condensed', sans-serif; }
.score-val { font-size: 1.3rem; font-weight: 700; color: var(--accent2); }

#rankingView { display: none; }
.rank-item { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); display: grid; grid-template-columns: 50px 1fr 120px; align-items: center; margin-bottom: 10px; }
.rank-num-col { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700; border-right: 1px solid var(--border); padding: 18px 0; }
.rank-score-col { border-left: 1px solid var(--border); text-align: center; padding: 18px 0; font-size: 2rem; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--accent2); }

@media (max-width: 750px) { .channel-grid { grid-template-columns: 1fr; } .stats-strip { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-text-block">
      <div class="logo-name">DRAMA<span>SERVICE</span></div>
      <div class="logo-by">BY PILSNERBRITT</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn" id="refreshBtn" onclick="refreshAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Uppdatera
    </button>
  </div>
</header>

<main>
  <div class="stats-strip" id="winnerStrip">
    <div class="strip-cell">
      <div class="strip-label">Mest visningar</div>
      <div class="strip-sub">Baserat på V10-snitt</div>
      <div id="win-views" class="winner-box"><div class="winner-val">—</div></div>
    </div>
    <div class="strip-cell">
      <div class="strip-label">Flest Likes</div>
      <div class="strip-sub">Baserat på V10-snitt</div>
      <div id="win-likes" class="winner-box"><div class="winner-val">—</div></div>
    </div>
    <div class="strip-cell">
      <div class="strip-label">Bäst Visn/Sub-Ratio</div>
      <div class="strip-sub">Baserat på V10-snitt</div>
      <div id="win-ratio" class="winner-box"><div class="winner-val">—</div></div>
    </div>
    <div class="strip-cell">
      <div class="strip-label">Mest Aktiv</div>
      <div class="strip-sub">Senaste 30 dagarna</div>
      <div id="win-active" class="winner-box"><div class="winner-val">—</div></div>
    </div>
  </div>

  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('channels')">Kanaler</button>
    <button class="nav-tab" onclick="switchTab('ranking')">Ranking</button>
  </nav>

  <div id="channelsView">
    <div class="channel-grid" id="channelsGrid"></div>
  </div>

  <div id="rankingView">
    <div class="rank-list" id="leaderboard"></div>
  </div>
</main>

<script>
const YT_API_KEY = 'AIzaSyAVOaSXrASWP64P_13DpRVCgmhwbT_crJE';
const CACHE_MINS = 30;

const TARGET_CHANNELS = [
  '@Realskilleras', '@ANJO1', '@JockeJonna', '@Medvikt',
  '@Motvikten', '@CarlFredrikAlexanderRask', '@Cluee-news'
];

let channels = [];
const fmt = (n) => n >= 1000000 ? (n/1000000).toFixed(1) + 'M' : n >= 1000 ? (n/1000).toFixed(1) + 'K' : n.toLocaleString('sv-SE');

async function fetchChannelData(handle) {
  const cacheKey = 'yt_cache_' + handle;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    const { data, ts } = JSON.parse(cached);
    if (Date.now() - ts < CACHE_MINS * 60 * 1000) return data;
  }

  // 1. Kanalinfo
  const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,contentDetails&forHandle=${encodeURIComponent(handle)}&key=${YT_API_KEY}`);
  const data = await res.json();
  if (!data.items?.length) throw new Error('Ej hittad');

  const ch = data.items[0];
  const uploadsId = ch.contentDetails.relatedPlaylists.uploads;

  // 2. Hämtar upp till 50 videor för att få en ärlig "30-dagars-aktivitet" (Kostar bara 1 API-enhet)
  const pRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails,snippet&playlistId=${uploadsId}&maxResults=50&key=${YT_API_KEY}`);
  const pData = await pRes.json();
  
  // A: Beräkna aktivitet (Mest aktiv på 30 dagar)
  const thirtyDaysAgo = new Date();
  thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const activeIn30d = pData.items.filter(i => new Date(i.snippet.publishedAt) >= thirtyDaysAgo).length;

  // B: PRO-TIP (V10) - Vi plockar ut video index 1 till 10. (Exkluderar index 0 som är nyast)
  const evalVideos = pData.items.length > 1 ? pData.items.slice(1, 11) : pData.items;
  const vIds = evalVideos.map(i => i.contentDetails.videoId).join(',');

  // 3. Hämta enbart stats för V10-videorna (Kostar 1 API-enhet)
  const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${vIds}&key=${YT_API_KEY}`);
  const vData = await vRes.json();

  const history = vData.items.map(v => parseInt(v.statistics.viewCount || 0));
  const result = {
    name: ch.snippet.title,
    avatar: ch.snippet.thumbnails.default.url,
    subs: parseInt(ch.statistics.subscriberCount || 0),
    views: history.reduce((a,b) => a+b, 0),
    likes: vData.items.reduce((s,v) => s + parseInt(v.statistics.likeCount || 0), 0),
    activeCount: activeIn30d, 
    evalCount: history.length // Antalet videor vi faktiskt utvärderar (oftast 10)
  };

  localStorage.setItem(cacheKey, JSON.stringify({ data: result, ts: Date.now() }));
  return result;
}

// Relativ poängberäkning
function calculateScore(c) {
  if (!c.views || !c.subs) return 0;
  
  // Använd antal utvärderade videor för att få fram rättvist snitt (V10)
  const evalCount = Math.max(c.evalCount, 1);
  const viewRatio = (c.views / evalCount) / c.subs;
  const viewScore = Math.min((viewRatio / 0.5) * 40, 40);
  
  const likeRatio = c.likes / c.views;
  const likeScore = Math.min((likeRatio / 0.1) * 60, 60);
  
  return Math.round(viewScore + likeScore);
}

async function loadApp() {
  const grid = document.getElementById('channelsGrid');
  grid.innerHTML = '<div style="grid-column:1/-1; padding:40px; text-align:center; color:var(--text3)">Ansluter till YouTube Data API...</div>';
  
  channels = [];
  const promises = TARGET_CHANNELS.map(async (handle) => {
    try {
      const data = await fetchChannelData(handle);
      channels.push(data);
    } catch (e) { console.error(handle, e); }
  });

  await Promise.all(promises);
  renderAll();
}

function renderAll() {
  const grid = document.getElementById('channelsGrid');
  grid.innerHTML = channels.map(c => {
    const evalCount = Math.max(c.evalCount, 1);
    const ratio = ((c.views / evalCount) / c.subs * 100).toFixed(1);
    const likeRate = ((c.likes / Math.max(c.views, 1)) * 100).toFixed(2);
    
    return `
      <div class="ch-card">
        <div class="ch-card-header">
          <img src="${c.avatar}" class="ch-avatar">
          <div class="ch-name">${c.name}</div>
          <div class="ch-status" style="color:var(--green); font-family:'IBM Plex Mono',monospace; font-size:0.55rem;">LIVE</div>
        </div>
        <div class="ch-stats">
          <div class="stat">
            <div class="stat-lbl">Subs</div>
            <div class="stat-num">${fmt(c.subs)}</div>
            <div class="stat-sub">Totalt</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Visningar</div>
            <div class="stat-num">${fmt(c.views)}</div>
            <div class="stat-sub">(V10-Snitt)</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Gillningsgrad</div>
            <div class="stat-num" style="color:var(--cyan)">${likeRate}%</div>
            <div class="stat-sub">Likes per visning</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Visn/Sub</div>
            <div class="stat-num" style="color:var(--gold)">${ratio}%</div>
            <div class="stat-sub">Räckvidd</div>
          </div>
        </div>
        <div class="score-row"><span>Performance Score</span><span class="score-val">${calculateScore(c)} / 100</span></div>
      </div>`;
  }).join('');

  updateWinners();
  renderRanking();
}

function updateWinners() {
  if (!channels.length) return;

  const winUI = (id, ch, val, color) => {
    document.getElementById(id).innerHTML = `
      <img src="${ch.avatar}" class="winner-img">
      <div class="winner-info">
        <div class="winner-name">${ch.name}</div>
        <div class="winner-val" style="color:${color}">${val}</div>
      </div>`;
  };

  // 1. Mest visningar
  const topViews = [...channels].sort((a,b) => b.views - a.views)[0];
  winUI('win-views', topViews, fmt(topViews.views), 'var(--cyan)');

  // 2. Flest Likes
  const topLikes = [...channels].sort((a,b) => b.likes - a.likes)[0];
  winUI('win-likes', topLikes, fmt(topLikes.likes), 'var(--accent2)');

  // 3. Bäst räckvidd/ratio
  const topRatio = [...channels].sort((a,b) => {
    const aCount = Math.max(a.evalCount, 1);
    const bCount = Math.max(b.evalCount, 1);
    return ((b.views/bCount)/b.subs) - ((a.views/aCount)/a.subs);
  })[0];
  const tCount = Math.max(topRatio.evalCount, 1);
  const ratioVal = ((topRatio.views / tCount) / topRatio.subs * 100).toFixed(1) + '%';
  winUI('win-ratio', topRatio, ratioVal, 'var(--gold)');

  // 4. Mest aktiv (Senaste 30 dagarna)
  const topActive = [...channels].sort((a,b) => b.activeCount - a.activeCount)[0];
  winUI('win-active', topActive, topActive.activeCount + ' videor', 'var(--green)');
}

function renderRanking() {
  const sorted = [...channels].sort((a,b) => calculateScore(b) - calculateScore(a));
  document.getElementById('leaderboard').innerHTML = sorted.map((c, i) => `
    <div class="rank-item">
      <div class="rank-num-col">${i+1}</div>
      <div class="rank-body">${c.name}</div>
      <div class="rank-score-col">${calculateScore(c)}</div>
    </div>
  `).join('');
}

function switchTab(t) {
  document.getElementById('channelsView').style.display = t==='channels'?'block':'none';
  document.getElementById('rankingView').style.display = t==='ranking'?'block':'none';
  document.querySelectorAll('.nav-tab').forEach((b,i) => b.classList.toggle('active', (t==='channels'&&i===0)||(t==='ranking'&&i===1)));
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  localStorage.clear();
  await loadApp();
  btn.classList.remove('spinning');
}

window.onload = loadApp;
</script>
</body>
</html>
